<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valorant Stats — Dashboard</title>
    <script src="data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #0e1015;
        --panel: #1a1f2b;
        --panel2: #222838;
        --line: #2c3344;
        --text: #ece8e1;
        --muted: #8b93a7;
        --accent: #ff4655;
        --green: #2ecc71;
        --red: #ff5b6e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        line-height: 1.4;
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 20px 60px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        border-bottom: 2px solid var(--accent);
        padding-bottom: 18px;
        margin-bottom: 24px;
      }
      header .id {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      header .id .tag {
        color: var(--muted);
        font-weight: 600;
        font-size: 20px;
      }
      header .badge {
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 13px;
        color: var(--muted);
      }
      header .badge b {
        color: var(--text);
      }
      header .updated {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }
      .accent {
        color: var(--accent);
      }

      .grid {
        display: grid;
        gap: 16px;
      }
      .cards {
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        margin-bottom: 8px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px 18px;
      }
      .card h3 {
        margin: 0 0 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
      }
      .card .big {
        font-size: 26px;
        font-weight: 800;
      }
      .card .sub {
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
      }
      .pos {
        color: var(--green);
      }
      .neg {
        color: var(--red);
      }

      .rrbar {
        height: 8px;
        background: var(--panel2);
        border-radius: 4px;
        margin-top: 10px;
        overflow: hidden;
      }
      .rrbar > i {
        display: block;
        height: 100%;
        background: var(--accent);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 18px 20px;
        margin-top: 18px;
      }
      .panel h2 {
        margin: 0 0 14px;
        font-size: 15px;
        letter-spacing: 0.5px;
      }
      .panel h2 small {
        color: var(--muted);
        font-weight: 400;
        font-size: 12px;
        margin-left: 8px;
      }
      .chartbox {
        position: relative;
        height: 300px;
      }
      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      @media (max-width: 820px) {
        .two {
          grid-template-columns: 1fr;
        }
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
      }
      th,
      td {
        padding: 9px 10px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .pill {
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }
      .pill.win {
        background: rgba(46, 204, 113, 0.15);
        color: var(--green);
      }
      .pill.loss {
        background: rgba(255, 91, 110, 0.15);
        color: var(--red);
      }
      .pill.na {
        background: var(--panel2);
        color: var(--muted);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
      }
      .chip b {
        color: var(--accent);
      }
      .foot {
        margin-top: 30px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="id" id="playerId">—</div>
        <span class="badge">Level <b id="level">—</b></span>
        <span class="badge">Region <b id="region">—</b></span>
        <span class="updated" id="updated"></span>
      </header>

      <div class="grid cards" id="cards"></div>

      <div class="two">
        <div class="panel">
          <h2>Elo Trend <small>recent rated games</small></h2>
          <div class="chartbox"><canvas id="eloChart"></canvas></div>
        </div>
        <div class="panel">
          <h2>Win Rate by Act <small>competitive</small></h2>
          <div class="chartbox"><canvas id="winChart"></canvas></div>
        </div>
      </div>

      <div class="panel">
        <h2>
          Rank Journey <small>end-of-act rank across every act played</small>
        </h2>
        <div class="chartbox"><canvas id="rankChart"></canvas></div>
      </div>

      <div class="panel">
        <h2>Recent Matches</h2>
        <div style="overflow-x: auto">
          <table id="matchTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Mode</th>
                <th>Map</th>
                <th>Agent</th>
                <th class="num">K</th>
                <th class="num">D</th>
                <th class="num">A</th>
                <th class="num">K/D</th>
                <th class="num">HS%</th>
                <th class="num">Score</th>
                <th>Result</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <h2>Agent Usage <small>recent + lifetime sample</small></h2>
        <div class="chips" id="agentChips"></div>
      </div>

      <div class="foot" id="foot"></div>
    </div>

    <script>
      const D = window.VAL_DATA;

      // ---- Tier helpers ---------------------------------------------------------
      const DIVS = [
        "Iron",
        "Bronze",
        "Silver",
        "Gold",
        "Platinum",
        "Diamond",
        "Ascendant",
        "Immortal",
      ];
      const DIV_COLOR = {
        Iron: "#6b6b6b",
        Bronze: "#a9774d",
        Silver: "#cfd6da",
        Gold: "#e7c84b",
        Platinum: "#46b6cf",
        Diamond: "#c489f5",
        Ascendant: "#27c277",
        Immortal: "#d6406b",
        Radiant: "#fff2a8",
      };
      function tierToIndex(name) {
        if (!name) return null;
        if (name.startsWith("Radiant")) return DIVS.length * 3 + 1; // top
        const [div, subRaw] = name.split(" ");
        const di = DIVS.indexOf(div);
        if (di < 0) return null;
        const sub = parseInt(subRaw || "1", 10) || 1;
        return di * 3 + sub; // Iron1=1 ... Immortal3=24
      }
      function tierColor(name) {
        return DIV_COLOR[(name || "").split(" ")[0]] || "#888";
      }
      function timeAgo(iso) {
        const s = (Date.now() - new Date(iso)) / 1000;
        const d = Math.floor(s / 86400);
        if (d > 0) return d + "d ago";
        const h = Math.floor(s / 3600);
        if (h > 0) return h + "h ago";
        return Math.floor(s / 60) + "m ago";
      }

      // ---- Header ---------------------------------------------------------------
      document.getElementById("playerId").innerHTML =
        D.account.name + ' <span class="tag">#' + D.account.tag + "</span>";
      document.getElementById("level").textContent = D.account.level;
      document.getElementById("region").textContent =
        D.account.region.toUpperCase();
      document.getElementById("updated").textContent =
        "data updated " + timeAgo(D.account.updated_at);

      // ---- Stat cards -----------------------------------------------------------
      const totW = D.seasonal.reduce((a, s) => a + s.wins, 0);
      const totG = D.seasonal.reduce((a, s) => a + s.games, 0);
      const lifeWR = totG ? ((100 * totW) / totG).toFixed(1) : "—";
      const lc = D.current.last_change;
      const lcClass = lc > 0 ? "pos" : lc < 0 ? "neg" : "";
      const lcStr = (lc > 0 ? "+" : "") + lc;

      document.getElementById("cards").innerHTML = [
        `<div class="card"><h3>Current Rank</h3>
     <div class="big" style="color:${tierColor(D.current.tier)}">${D.current.tier}</div>
     <div class="sub">${D.current.rr} RR · last <span class="${lcClass}">${lcStr}</span> · elo ${D.current.elo}</div>
     <div class="rrbar"><i style="width:${D.current.rr}%"></i></div></div>`,
        `<div class="card"><h3>Peak Rank</h3>
     <div class="big" style="color:${tierColor(D.peak.tier)}">${D.peak.tier}</div>
     <div class="sub">act ${D.peak.season}</div></div>`,
        `<div class="card"><h3>Lifetime Win Rate</h3>
     <div class="big">${lifeWR}%</div>
     <div class="sub">${totW}W / ${totG - totW}L · ${totG} comp games</div></div>`,
        `<div class="card"><h3>Acts Played</h3>
     <div class="big">${D.seasonal.length}</div>
     <div class="sub">account level ${D.account.level}</div></div>`,
      ].join("");

      // ---- Chart defaults -------------------------------------------------------
      Chart.defaults.color = "#8b93a7";
      Chart.defaults.borderColor = "#2c3344";
      Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;

      // ---- Elo trend ------------------------------------------------------------
      const hist = [...D.mmr_history].reverse();
      new Chart(document.getElementById("eloChart"), {
        type: "line",
        data: {
          labels: hist.map((h) =>
            new Date(h.date).toLocaleDateString(undefined, {
              month: "short",
              day: "numeric",
            }),
          ),
          datasets: [
            {
              label: "Elo",
              data: hist.map((h) => h.elo),
              borderColor: "#ff4655",
              backgroundColor: "rgba(255,70,85,.12)",
              fill: true,
              tension: 0.3,
              pointRadius: 4,
              pointBackgroundColor: "#ff4655",
            },
          ],
        },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                afterLabel: (c) => {
                  const h = hist[c.dataIndex];
                  return `${h.tier} · ${h.last_change > 0 ? "+" : ""}${h.last_change} RR · ${h.map}`;
                },
              },
            },
          },
          scales: { y: { title: { display: true, text: "Elo" } } },
        },
      });

      // ---- Win rate by act ------------------------------------------------------
      new Chart(document.getElementById("winChart"), {
        type: "bar",
        data: {
          labels: D.seasonal.map((s) => s.act),
          datasets: [
            {
              label: "Win %",
              data: D.seasonal.map((s) =>
                s.games ? +((100 * s.wins) / s.games).toFixed(1) : 0,
              ),
              backgroundColor: D.seasonal.map((s) => tierColor(s.end_tier)),
            },
          ],
        },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                afterLabel: (c) => {
                  const s = D.seasonal[c.dataIndex];
                  return `${s.wins}W/${s.games}G · ended ${s.end_tier}`;
                },
              },
            },
          },
          scales: {
            x: { ticks: { autoSkip: true, maxRotation: 0 } },
            y: {
              suggestedMin: 0,
              suggestedMax: 100,
              title: { display: true, text: "Win %" },
            },
          },
        },
      });

      // ---- Rank journey ---------------------------------------------------------
      const ranks = D.seasonal.map((s) => tierToIndex(s.end_tier));
      const TICKS = []; // build readable y labels
      DIVS.forEach((d, di) =>
        [1, 2, 3].forEach((sub) => TICKS.push([di * 3 + sub, d[0] + sub])),
      );
      TICKS.push([DIVS.length * 3 + 1, "RAD"]);
      const tickMap = Object.fromEntries(TICKS);
      new Chart(document.getElementById("rankChart"), {
        type: "line",
        data: {
          labels: D.seasonal.map((s) => s.act),
          datasets: [
            {
              label: "End-of-act rank",
              data: ranks,
              borderColor: "#c489f5",
              tension: 0.25,
              pointRadius: 4,
              pointBackgroundColor: D.seasonal.map((s) =>
                tierColor(s.end_tier),
              ),
              pointBorderColor: "#0e1015",
            },
          ],
        },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: { label: (c) => D.seasonal[c.dataIndex].end_tier },
            },
          },
          scales: {
            x: { ticks: { autoSkip: true, maxRotation: 45, minRotation: 45 } },
            y: {
              min: Math.min(...ranks) - 1,
              max: Math.max(...ranks) + 1,
              ticks: { stepSize: 1, callback: (v) => tickMap[v] || "" },
            },
          },
        },
      });

      // ---- Recent matches table -------------------------------------------------
      const tb = document.querySelector("#matchTable tbody");
      tb.innerHTML = D.recent_matches
        .map((m) => {
          const kd = m.deaths
            ? (m.kills / m.deaths).toFixed(2)
            : m.kills.toFixed(2);
          const res =
            m.won === true
              ? '<span class="pill win">WIN</span>'
              : m.won === false
                ? '<span class="pill loss">LOSS</span>'
                : '<span class="pill na">—</span>';
          return `<tr>
    <td>${new Date(m.started_at).toLocaleDateString(undefined, { month: "short", day: "numeric" })}</td>
    <td>${m.mode}</td><td>${m.map}</td><td>${m.agent}</td>
    <td class="num">${m.kills}</td><td class="num">${m.deaths}</td><td class="num">${m.assists}</td>
    <td class="num">${kd}</td><td class="num">${m.hs_pct.toFixed(1)}%</td>
    <td class="num">${m.score.toLocaleString()}</td><td>${res}</td>
  </tr>`;
        })
        .join("");

      // ---- Agent usage ----------------------------------------------------------
      const counts = {};
      [...D.recent_matches, ...D.lifetime].forEach((m) => {
        counts[m.agent] = (counts[m.agent] || 0) + 1;
      });
      document.getElementById("agentChips").innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([a, n]) => `<span class="chip">${a} <b>×${n}</b></span>`)
        .join("");

      document.getElementById("foot").textContent =
        "Source: HenrikDev unofficial Valorant API · regenerate with scripts/fetch.sh + scripts/build-data.sh";
    </script>
  </body>
</html>
